    :root { color-scheme: light; --ink: #7e4a5d; --pink: #e84a5f; --line: #ffb7c5; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; padding: 20px; display: grid; place-items: center; overflow-x: hidden; background: radial-gradient(circle at top right, #fffaf0, #ffd1dc 48%, #fdf2f8); color: var(--ink); font-family: "Nunito", "Quicksand", system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; }

    .mark { display: grid; place-items: center; width: 58px; height: 58px; margin: 0 auto 18px; border: 2px solid #ffd1dc; border-radius: 18px; background: #fffaf0; box-shadow: 0 8px 20px rgba(255, 183, 197, 0.32); color: #c2185b; font-family: Georgia, serif; font-size: 29px; font-weight: 800; }
    h1 { margin: 0 0 14px; color: var(--pink); font-size: 28px; line-height: 1.3; letter-spacing: 0; text-shadow: 2px 2px 0 #fff, 4px 4px 0 #ffd1dc; }
    p { margin: 0 0 26px; color: #9d6477; font-size: 14px; line-height: 1.8; }
    .button { display: flex; align-items: center; justify-content: center; width: 100%; min-height: 52px; padding: 13px 22px; border: 3px solid #fff; border-radius: 999px; background: linear-gradient(135deg, #ff9eb5, #ffb7c5); box-shadow: 0 8px 20px rgba(255, 158, 181, 0.4); color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 0; text-decoration: none; text-shadow: 0 1px 2px rgba(232, 74, 95, 0.4); transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .button:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(255, 158, 181, 0.48), 0 0 0 4px rgba(255, 255, 255, 0.7); }
    .button:active { transform: translateY(0); }
    .button:focus-visible { outline: 3px solid #c2185b; outline-offset: 4px; }
    @media (max-width: 520px) { .card { padding: 34px 22px 29px; border-radius: 24px; } h1 { font-size: 24px; } }
  </style>
</head>
